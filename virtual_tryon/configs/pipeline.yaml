quality:
  min_output_width: 256
  min_output_height: 256
  background_change_threshold: 0.18
  garment_change_threshold: 0.04
  artifact_threshold: 0.35

refinement:
  refine_only_masked_region: true
  preserve_face: true
  preserve_background: true
  default_prompt: "Refine only the clothing region. Preserve the person's face, hair, hands, pose, body shape, and background. Improve garment boundaries, fabric realism, folds, lighting, and texture fidelity to the reference garment."

repair_regions:
  - collar
  - sleeve
  - hand_overlap
  - hemline
